  &lt;script&gt;
  const kesamoUrl =
    &quot;https://church.jbch.org/fellowship/all_board/list.php?uid=5009617&amp;auth_ok=1&amp;flag=1&amp;chId=264&amp;use_kind=1&amp;boardId=14854&amp;page=1&amp;menu_num=7&amp;smenu_num=3&amp;abtype=2&quot;;

  const rssUrl = &quot;https://rss.blog.naver.com/1988paul.xml&quot;;
  const rssApiUrl =
    &quot;https://api.rss2json.com/v1/api.json?rss_url=&quot; + encodeURIComponent(rssUrl);

  const fallbackPost = {
    title: &quot;\uc874\uc7ac\ud558\ub294 \uc2e0(\uc564\ud130\ub2c8 \ud50c\ub8e8)&quot;,
    link: &quot;https://m.blog.naver.com/PostView.naver?blogId=1988paul&amp;logNo=224305192941&amp;trackingCode=external&quot;,
    pubDate: &quot;2026-06-03 15:28:11&quot;
  };

  let currentPost = fallbackPost;

  function cleanTitle(title){
    return title
      .replace(/\s+-\s+\uc131\uacbd\uc740 \uc0ac\uc2e4\uc774\ub2e4.*$/,&quot;&quot;)
      .replace(/\s*\(\uc0dd\uba85\uc758\ub9d0\uc500\uc120\uad50\ud68c.*$/,&quot;&quot;)
      .trim();
  }

  function mobileBlogUrl(link){
    const match = link.match(/blog\.naver\.com\/([^/]+)\/(\d+)/);
    if(!match) return link;
    return &quot;https://m.blog.naver.com/PostView.naver?blogId=&quot; +
      match[1] + &quot;&amp;logNo=&quot; + match[2] + &quot;&amp;trackingCode=rss&quot;;
  }

  function formatDate(value){
    if(!value) return &quot;&quot;;
    const date = new Date(value.replace(&quot; &quot;,&quot;T&quot;) + &quot;+09:00&quot;);
    if(Number.isNaN(date.getTime())) return value;
    return date.getFullYear() + &quot;.&quot; +
      String(date.getMonth()+1).padStart(2,&quot;0&quot;) + &quot;.&quot; +
      String(date.getDate()).padStart(2,&quot;0&quot;) + &quot; &quot; +
      String(date.getHours()).padStart(2,&quot;0&quot;) + &quot;:&quot; +
      String(date.getMinutes()).padStart(2,&quot;0&quot;);
  }

  function setStatus(isNew, text){
    const badge = document.getElementById(&quot;badge&quot;);
    const counter = document.getElementById(&quot;newCounter&quot;);

    badge.textContent = isNew ? &quot;\uc0c8 \uae00&quot; : &quot;\ucd5c\uc2e0 \uae00&quot;;
    badge.classList.toggle(&quot;new&quot;, isNew);
    counter.classList.toggle(&quot;on&quot;, isNew);
    document.getElementById(&quot;notice&quot;).textContent = text;
  }

  function renderPost(post, isNew){
    currentPost = post;
    document.getElementById(&quot;postTitle&quot;).textContent = cleanTitle(post.title);
    document.getElementById(&quot;postDesc&quot;).textContent =
      &quot;\ube14\ub85c\uadf8 \ub4f1\ub85d: &quot; + formatDate(post.pubDate);

    if(isNew){
      setStatus(true, &quot;\uc0c8 \ube14\ub85c\uadf8 \uae00\uc774 \ud655\uc778\ub418\uc5c8\uc2b5\ub2c8\ub2e4. \uae00\uc744 \uc5f4\uba74 \uc77d\uc740 \uae00\ub85c \ud45c\uc2dc\ub429\ub2c8\ub2e4.&quot;);
    }else{
      setStatus(false, &quot;\ucd5c\uc2e0 \uae00\uc744 \ud655\uc778\ud588\uc2b5\ub2c8\ub2e4. \ud558\ud2b8 \uacf5\uac10\uc740 \uc5f4\ub9b0 \ud654\uba74\uc5d0\uc11c \uc9c1\uc811 \ub20c\ub7ec\uc8fc\uc138\uc694.&quot;);
    }
  }

  async function checkLatestPost(manual){
    document.getElementById(&quot;badge&quot;).textContent = &quot;\ud655\uc778 \uc911&quot;;
    document.getElementById(&quot;notice&quot;).textContent = &quot;\ub124\uc774\ubc84 \ube14\ub85c\uadf8 \ucd5c\uc2e0 \uae00\uc744 \ud655\uc778\ud558\ub294 \uc911\uc785\ub2c8\ub2e4.&quot;;

    try{
      const response = await fetch(rssApiUrl, { cache:&quot;no-store&quot; });
      if(!response.ok) throw new Error(&quot;RSS \ud655\uc778 \uc2e4\ud328&quot;);
      const data = await response.json();
      const latest = data.items &amp;&amp; data.items[0];
      if(!latest) throw new Error(&quot;\ucd5c\uc2e0 \uae00 \uc5c6\uc74c&quot;);

      const post = {
        title: latest.title || fallbackPost.title,
        link: mobileBlogUrl(latest.link || fallbackPost.link),
        pubDate: latest.pubDate || &quot;&quot;
      };

      const lastSeen = localStorage.getItem(&quot;kesamoLastSeenPost&quot;);
      const isNew = Boolean(lastSeen &amp;&amp; lastSeen !== post.link);

      if(!lastSeen){
        localStorage.setItem(&quot;kesamoLastSeenPost&quot;, post.link);
      }

      renderPost(post, isNew);
    }catch(error){
      renderPost(fallbackPost, false);
      document.getElementById(&quot;notice&quot;).textContent =
        manual
          ? &quot;\uc9c0\uae08\uc740 \uc0c8\uae00 \ud655\uc778\uc774 \uc5b4\ub835\uc2b5\ub2c8\ub2e4. \uc7a0\uc2dc \ub4a4 \ub2e4\uc2dc \ub20c\ub7ec\uc8fc\uc138\uc694.&quot;
          : &quot;\ucd5c\uc2e0 \uae00 \ud655\uc778\uc774 \ub2a6\uc5b4\uc838\uc11c \uc800\uc7a5\ub41c \uae00\uc744 \ubcf4\uc5ec\ub4dc\ub9bd\ub2c8\ub2e4.&quot;;
    }
  }

  function markSeen(){
    localStorage.setItem(&quot;kesamoLastSeenPost&quot;, currentPost.link);
    setStatus(false, &quot;\uc77d\uc740 \uae00\ub85c \ud45c\uc2dc\ud588\uc2b5\ub2c8\ub2e4. \ud558\ud2b8 \uacf5\uac10\uc740 \uc5f4\ub9b0 \ud654\uba74\uc5d0\uc11c \uc9c1\uc811 \ub20c\ub7ec\uc8fc\uc138\uc694.&quot;);
  }

  function openKesamo(){
    markSeen();
    window.location.href = kesamoUrl;
  }

  function openBlog(){
    markSeen();
    window.location.href = currentPost.link;
  }

  function sharePage(){
    const text = &quot;\uae68\uc0ac\ubaa8 \uc0c8 \uae00\uc785\ub2c8\ub2e4. \uc544\ub798 \ub9c1\ud06c\uc5d0\uc11c \ud655\uc778\ud574 \uc8fc\uc138\uc694.&quot;;
    const url = currentPost.link;

    if(navigator.share){
      navigator.share({
        title:&quot;\uae68\uc0ac\ubaa8 \uc0c8 \uae00&quot;,
        text:text,
        url:url
      });
    }else{
      navigator.clipboard.writeText(url);
      alert(&quot;\ub9c1\ud06c\uac00 \ubcf5\uc0ac\ub418\uc5c8\uc2b5\ub2c8\ub2e4. \uce74\ud1a1\uc5d0 \ubd99\uc5ec\ub123\uc5b4 \uc8fc\uc138\uc694.&quot;);
    }
  }

  checkLatestPost(false);
